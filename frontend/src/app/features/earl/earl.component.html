<div [class]="earlClass()">
  <svg viewBox="0 0 200 200" class="earl-svg" xmlns="http://www.w3.org/2000/svg">
    <!-- Teapot body -->
    <ellipse cx="100" cy="135" rx="68" ry="52"
      [attr.fill]="earlColor()"
      stroke="#8b6914" stroke-width="2"/>

    <!-- Teapot body shine -->
    <ellipse cx="82" cy="118" rx="18" ry="12"
      fill="rgba(255,255,255,0.12)" transform="rotate(-20 82 118)"/>

    <!-- Spout -->
    <path d="M 168 118 Q 196 100 188 140 Q 178 138 168 130"
      [attr.fill]="earlColor()"
      stroke="#8b6914" stroke-width="2"/>

    <!-- Handle -->
    <path d="M 32 118 Q 8 122 8 145 Q 8 168 32 162"
      fill="none"
      [attr.stroke]="earlColor()"
      stroke-width="10" stroke-linecap="round"/>

    <!-- Lid base -->
    <ellipse cx="100" cy="83" rx="42" ry="10"
      [attr.fill]="earlColor()"
      stroke="#8b6914" stroke-width="2"/>

    <!-- Lid top -->
    <ellipse cx="100" cy="80" rx="38" ry="8"
      fill="#d4a017" stroke="#8b6914" stroke-width="1.5"/>

    <!-- Lid knob -->
    <ellipse cx="100" cy="70" rx="8" ry="6"
      fill="#d4a017" stroke="#8b6914" stroke-width="1.5"/>

    <!-- Earl's face — eyes -->
    @if (leftEyePath()) {
      <!-- Angry/sad eyebrows when outraged or disappointed -->
      <path [attr.d]="leftEyePath()!"
        stroke="#3a2000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path [attr.d]="rightEyePath()!"
        stroke="#3a2000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    }
    <circle cx="85" cy="120" r="7" fill="#2c1a00"/>
    <circle cx="115" cy="120" r="7" fill="#2c1a00"/>
    <!-- Eye shine -->
    <circle cx="87" cy="118" r="2.5" fill="white" opacity="0.7"/>
    <circle cx="117" cy="118" r="2.5" fill="white" opacity="0.7"/>

    <!-- Mouth — changes per mood -->
    <path [attr.d]="mouthPath()"
      stroke="#2c1a00" stroke-width="3"
      fill="none" stroke-linecap="round"/>

    <!-- Blush when outraged -->
    @if (mood() === 'dramatically_outraged') {
      <ellipse cx="72" cy="130" rx="10" ry="5" fill="rgba(220, 80, 80, 0.3)"/>
      <ellipse cx="128" cy="130" rx="10" ry="5" fill="rgba(220, 80, 80, 0.3)"/>
    }

    <!-- Steam (only when not existentially disappointed) -->
    @if (steamVisible()) {
      <g class="earl-steam">
        <path d="M 88 72 Q 83 62 88 52 Q 93 42 88 32"
          stroke="#a8d8c8" stroke-width="3" fill="none" stroke-linecap="round"
          class="steam-1"/>
        <path d="M 100 70 Q 95 60 100 50 Q 105 40 100 30"
          stroke="#a8d8c8" stroke-width="3" fill="none" stroke-linecap="round"
          class="steam-2"/>
        <path d="M 112 72 Q 107 62 112 52 Q 117 42 112 32"
          stroke="#a8d8c8" stroke-width="3" fill="none" stroke-linecap="round"
          class="steam-3"/>
      </g>
    }

    <!-- Earl's name tag on the body -->
    <text x="100" y="148" text-anchor="middle"
      font-family="Georgia, serif" font-size="11"
      fill="#2c1a00" font-style="italic">Earl</text>
  </svg>

  <div class="earl-mood-label">
    @switch (mood()) {
      @case ('mildly_annoyed')             { 😒 Mildly Annoyed }
      @case ('deeply_offended')            { 😤 Deeply Offended }
      @case ('dramatically_outraged')      { 😡 Dramatically Outraged }
      @case ('existentially_disappointed') { 😔 Existentially Disappointed }
    }
  </div>
</div>
