# Server
server.port=8080

# Spring AI — Gemini
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-1.5-flash
spring.ai.google.genai.chat.options.temperature=0.95

# TeaGPT config
teagpt.calendar.service-account-file=classpath:google-calendar-service-account.json
teagpt.calendar.calendar-id=primary
teagpt.calendar.user-to-impersonate=${CALENDAR_USER_EMAIL:}
teagpt.cors.allowed-origins=http://localhost:4200

# Logging
logging.level.com.teagpt=DEBUG
